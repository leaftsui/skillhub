name: Test Publish Script (Temporary)

on:
  pull_request:
    paths:
      - 'scripts/publish-cli.sh'
      - 'scripts/tests/publish-cli-test.sh'
      - '.github/workflows/test-publish-script.yml'
  push:
    branches:
      - feat/cli-auto-build

jobs:
  test-publish-script:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run publish-cli integration tests
        run: bash scripts/tests/publish-cli-test.sh
